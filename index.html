#victory-box h1 { color: #ffd700; font-size: 28px; margin-bottom: 8px; }
#victory-box .v-sub { color: #ffaa40; font-size: 16px; margin-bottom: 16px; }
#victory-box .v-stats { text-align: left; font-size: 13px; color: #ddd; line-height: 1.8; }
#victory-box .v-stars { font-size: 36px; margin: 12px 0; }
#victory-box button {
    background: linear-gradient(135deg, #ffd700, #c4923a); border: none;
    color: #1a0a00; padding: 12px 36px; border-radius: 24px;
    font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 14px;
}

/* Auto-save indicator */
#autosave-ind {
    position: fixed; bottom: 125px; left: 10px; z-index: 15;
    font-size: 10px; color: rgba(255,255,255,0.4); display: none;
}
#autosave-ind.show { display: block; animation: autosaveFade 2s forwards; }
@keyframes autosaveFade {
    0% { opacity: 0.8; } 100% { opacity: 0; }
}

/* Year display enhanced */
#year-display { font-variant-numeric: tabular-nums; }

/* Enhanced mobile */
@media (max-width: 600px) {
    #minimap { width: 80px; height: 80px; right: 50px; }
    #ach-panel-btn { right: 138px; }
    #stats-btn { right: 178px; }
    #hud { font-size: 11px; padding: 6px 8px; }
    .res-icon { font-size: 14px; }
    #disaster-alert { max-width: 260px; padding: 10px 14px; }
    #advisor { max-width: 260px; bottom: 130px; font-size: 11px; }
    #chronicle-btn { top: 90px; right: 6px; }
    .build-tab { min-width: 60px; padding: 5px 8px; }
    .build-tab .b-icon { font-size: 18px; }
    .build-tab .b-name { font-size: 9px; }
    #save-ctrl { bottom: 120px; }
}
@media (max-width: 400px) {
    #hud { font-size: 10px; padding: 4px 6px; gap: 4px 8px; }
    .res-icon { font-size: 12px; }
    #era-label { font-size: 11px; padding: 3px 8px; }
    #speed-ctrl button { padding: 3px 6px; font-size: 10px; }
    #controls button, #save-ctrl button, #chronicle-btn, #stats-btn, #ach-panel-btn {
        width: 30px; height: 30px; font-size: 14px;
    }
}


/* ===== v4.0 Dark/Light Mode ===== */
body.light-mode {
    background: #e8e0d4; color: #333;
}
body.light-mode #hud {
    background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 100%);
    color: #333;
}
body.light-mode .res-val { color: #8b6914; }
body.light-mode #buildPanel { background: rgba(255,255,255,0.95); border-top-color: #bbb; }
body.light-mode .build-tab { background: #f0e8dc; color: #333; }
body.light-mode .build-tab:hover { background: #e0d8cc; }
body.light-mode .build-tab.selected { border-color: #c4923a; background: #e0d8cc; }
body.light-mode .build-tab .b-name { color: #555; }
body.light-mode #buildInfo { background: #f5f0e8; color: #333; }
body.light-mode #controls button, body.light-mode #save-ctrl button,
body.light-mode #chronicle-btn, body.light-mode #stats-btn,
body.light-mode #ach-panel-btn, body.light-mode #policy-btn,
body.light-mode #quest-btn, body.light-mode #trade-btn,
body.light-mode #theme-btn, body.light-mode #sandbox-btn {
    background: rgba(255,255,255,0.85); color: #333; border-color: #bbb;
}
body.light-mode #speed-ctrl button { background: rgba(255,255,255,0.85); color: #666; border-color: #bbb; }
body.light-mode #speed-ctrl button.active { color: #c4923a; border-color: #c4923a; }
body.light-mode .toast { background: rgba(255,255,255,0.9); color: #333; }
body.light-mode #minimap { background: rgba(255,255,255,0.8); border-color: #bbb; }
